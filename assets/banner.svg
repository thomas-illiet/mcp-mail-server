<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Email MCP Server</title>
  <desc id="desc">FastMCP email server with SMTP delivery, MailDev testing, Prometheus metrics, progress, logging, and regex domain allowlist.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1320"/>
      <stop offset="0.55" stop-color="#123238"/>
      <stop offset="1" stop-color="#18222F"/>
    </linearGradient>
    <linearGradient id="card" x1="388" y1="52" x2="1120" y2="308" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="136%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M50 0H0V50" stroke="#FFFFFF" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <clipPath id="bannerClip">
      <rect width="1280" height="360" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#bannerClip)">
    <rect width="1280" height="360" rx="28" fill="url(#bg)"/>
    <rect width="1280" height="360" rx="28" fill="url(#grid)"/>
    <circle cx="1112" cy="86" r="82" fill="#2DD4BF" fill-opacity="0.12"/>
    <circle cx="1190" cy="286" r="66" fill="#F97316" fill-opacity="0.11"/>
    <circle cx="118" cy="264" r="82" fill="#38BDF8" fill-opacity="0.10"/>

    <g filter="url(#shadow)">
      <rect x="84" y="78" width="232" height="184" rx="22" fill="#F8FAFC"/>
      <rect x="110" y="118" width="180" height="104" rx="11" stroke="#0F172A" stroke-width="11"/>
      <path d="M111 120L200 181L289 120" stroke="#0F172A" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M112 222L170 166" stroke="#0F172A" stroke-width="10" stroke-linecap="round"/>
      <path d="M288 222L230 166" stroke="#0F172A" stroke-width="10" stroke-linecap="round"/>
      <circle cx="284" cy="84" r="27" fill="#2DD4BF"/>
      <path d="M272 84L282 94L297 75" stroke="#0B1320" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <rect x="374" y="58" width="792" height="244" rx="24" fill="url(#card)" stroke="#FFFFFF" stroke-opacity="0.18"/>

    <text x="420" y="126" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="52" font-weight="800" letter-spacing="0">
      Email MCP Server
    </text>
    <text x="423" y="168" fill="#BFE8E3" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="23" font-weight="600" letter-spacing="0">
      An MCP server that ships your emails with style
    </text>

    <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17" font-weight="700" letter-spacing="0" text-anchor="middle" dominant-baseline="middle">
      <rect x="424" y="211" width="118" height="38" rx="19" fill="#2DD4BF" fill-opacity="0.18" stroke="#2DD4BF" stroke-opacity="0.65"/>
      <text x="483" y="231" fill="#DFFFFA">FastMCP</text>

      <rect x="556" y="211" width="88" height="38" rx="19" fill="#38BDF8" fill-opacity="0.16" stroke="#38BDF8" stroke-opacity="0.64"/>
      <text x="600" y="231" fill="#E0F7FF">SMTP</text>

      <rect x="658" y="211" width="108" height="38" rx="19" fill="#F97316" fill-opacity="0.16" stroke="#FDBA74" stroke-opacity="0.66"/>
      <text x="712" y="231" fill="#FFF1E6">MailDev</text>

      <rect x="780" y="211" width="116" height="38" rx="19" fill="#A7F3D0" fill-opacity="0.12" stroke="#A7F3D0" stroke-opacity="0.55"/>
      <text x="838" y="231" fill="#DCFCE7">Progress</text>

      <rect x="910" y="211" width="108" height="38" rx="19" fill="#FDE68A" fill-opacity="0.12" stroke="#FDE68A" stroke-opacity="0.55"/>
      <text x="964" y="231" fill="#FEF3C7">Metrics</text>

      <rect x="1032" y="211" width="92" height="38" rx="19" fill="#FCA5A5" fill-opacity="0.12" stroke="#FCA5A5" stroke-opacity="0.55"/>
      <text x="1078" y="231" fill="#FFE4E6">Regex</text>
    </g>

    <g stroke="#A7F3D0" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.92">
      <path d="M424 273H510"/>
      <path d="M510 273C536 273 536 261 562 261H608"/>
      <path d="M510 273C536 273 536 286 562 286H608"/>
      <circle cx="424" cy="273" r="6" fill="#A7F3D0"/>
      <circle cx="608" cy="261" r="6" fill="#A7F3D0"/>
      <circle cx="608" cy="286" r="6" fill="#A7F3D0"/>
    </g>

    <text x="640" y="281" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" font-weight="600" letter-spacing="0">
      env config · base64 attachments · mock mode · rootless container
    </text>
  </g>
</svg>
