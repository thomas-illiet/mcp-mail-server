apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "email-mcp.fullname" . }}
  labels:
    {{- include "email-mcp.labels" . | nindent 4 }}
data:
  MCP_PORT: {{ .Values.config.mcpPort | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  EMAIL_MOCK_MODE: {{ .Values.config.emailMockMode | quote }}
  SMTP_HOST: {{ .Values.smtp.host | quote }}
  SMTP_PORT: {{ .Values.smtp.port | quote }}
  SMTP_FROM: {{ .Values.smtp.from | quote }}
  SMTP_USE_TLS: {{ .Values.smtp.useTLS | quote }}
  SMTP_USE_SSL: {{ .Values.smtp.useSSL | quote }}
  SMTP_TIMEOUT: {{ .Values.smtp.timeout | quote }}
  ALLOWED_RECIPIENT_DOMAIN_REGEX: {{ .Values.config.allowedRecipientDomainRegex | quote }}
