{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "email-mcp.secretName" . }}
  labels:
    {{- include "email-mcp.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.secret.usernameKey }}: {{ .Values.smtp.username | quote }}
  {{ .Values.secret.passwordKey }}: {{ .Values.smtp.password | quote }}
  {{ .Values.secret.bearerTokenKey }}: {{ .Values.auth.bearerToken | quote }}
{{- end }}
